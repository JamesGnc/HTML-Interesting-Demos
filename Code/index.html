<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X Code with Random Salt</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
        * {margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;}
        body {background: linear-gradient(135deg, #4facfe, #00f2fe, #4facfe); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;}
        .container {width: 100%; max-width: 850px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15); overflow: hidden; color: #2c3e50; padding: 30px; border: 1px solid rgba(255, 255, 255, 0.5);}
        header {text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid rgba(74, 137, 219, 0.2);}
        h1 {font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(to right, #007cf8, #00dfd8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: inline-block;}
        .subtitle {font-size: 1.1rem; color: #4a6baf; max-width: 600px; margin: 0 auto; line-height: 1.6;}
        .input-area, .output-area {margin-bottom: 25px;}
        label {display: block; margin-bottom: 10px; font-weight: 600; color: #007cf8; font-size: 1.1rem;}
        textarea, input, .result-box {width: 100%; padding: 15px; border-radius: 12px; border: 1px solid rgba(74, 137, 219, 0.3); background: rgba(255, 255, 255, 0.7); color: #2c3e50; font-size: 1rem; transition: all 0.3s ease;}
        textarea {min-height: 120px; resize: vertical;}
        textarea:focus, input:focus {outline: none; border-color: #007cf8; box-shadow: 0 0 0 3px rgba(0, 124, 248, 0.2);}
        .result-box {min-height: 150px; font-family: monospace; overflow-wrap: break-word; display: flex; align-items: center; justify-content: center;}
        .controls {display: flex; gap: 15px; flex-wrap: wrap; margin: 25px 0;}
        .btn {padding: 14px 28px; border-radius: 12px; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 10px;}
        .btn-primary {background: linear-gradient(to right, #007cf8, #00dfd8); color: white; flex: 1;}
        .btn-secondary {background: rgba(255, 255, 255, 0.7); color: #007cf8; border: 1px solid rgba(0, 124, 248, 0.3);}
        .btn:hover {transform: translateY(-3px); box-shadow: 0 7px 14px rgba(0, 0, 0, 0.1);}
        .btn:active {transform: translateY(1px);}
        .algorithm-info {background: rgba(255, 255, 255, 0.7); border-radius: 12px; padding: 20px; margin: 30px 0; border-left: 4px solid #007cf8;}
        .algorithm-info h3 {color: #007cf8; margin-bottom: 15px; font-size: 1.4rem;}
        .algorithm-info p, .algorithm-info li {line-height: 1.7; color: #4a6baf;}
        .history {margin-top: 30px;}
        .history h3 {color: #007cf8; margin-bottom: 15px; display: flex; align-items: center; gap: 10px;}
        .history-items {max-height: 200px; overflow-y: auto; padding-right: 10px;}
        .history-item {background: rgba(255, 255, 255, 0.7); border-radius: 8px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; font-size: 0.9rem; border: 1px solid rgba(0, 124, 248, 0.15);}
        .history-original {color: #4a6baf; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;}
        .history-encrypted {color: #007cf8; font-family: monospace; max-width: 35%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;}
        .placeholder-text {color: rgba(74, 107, 175, 0.5); font-style: italic;}
        @media (max-width: 768px) {.container {padding: 20px;} h1 {font-size: 2rem;} .controls {flex-direction: column;} .btn {width: 100%; justify-content: center;}}
        .notification {position: fixed; top: 20px; right: 20px; padding: 15px 25px; background: #007cf8; color: white; border-radius: 8px; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15); transform: translateX(200%); transition: transform 0.4s ease; z-index: 1000;}
        .notification.show {transform: translateX(0);}
    </style>
</head>
<body>
<div class="container">
<header>
<h1><i class="fas fa-lock"></i> Gerald Magic Code</h1>
<p class="subtitle">Random Salt Encoding - 更安全的混合加密</p>
</header>

<main>
<div class="input-area">
<label for="inputText"><i class="fas fa-keyboard"></i> 输入要加密/解密的字符串</label>
<textarea id="inputText" placeholder="在此输入文本..."></textarea>
</div>

<div class="input-area">
<label for="saltText"><i class="fas fa-pepper-hot"></i> 盐值 (Salt)（可选，提高安全性）</label>
<input id="saltText" type="text" placeholder="例如：MySecretSalt">
</div>

<div class="controls">
<button id="encryptBtn" class="btn btn-primary"><i class="fas fa-lock"></i> 加密字符串</button>
<button id="decryptBtn" class="btn btn-secondary"><i class="fas fa-unlock"></i> 解密字符串</button>
<button id="copyBtn" class="btn btn-secondary" disabled><i class="fas fa-copy"></i> 复制结果</button>
<button id="clearBtn" class="btn btn-secondary"><i class="fas fa-broom"></i> 清除</button>
</div>

<div class="output-area">
<label for="outputText"><i class="fas fa-lock-open"></i> 结果</label>
<div id="outputText" class="result-box"><span class="placeholder-text">加密或解密结果将显示在这里...</span></div>
</div>
</main>

<div class="watermark">Gerald Author</div>
</div>

<div id="notification" class="notification">结果已复制到剪贴板！</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const inputText = document.getElementById('inputText');
    const saltText = document.getElementById('saltText');
    const outputText = document.getElementById('outputText');
    const encryptBtn = document.getElementById('encryptBtn');
    const decryptBtn = document.getElementById('decryptBtn');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');
    const notification = document.getElementById('notification');

    function base64Encode(str) {
        return btoa(unescape(encodeURIComponent(str)));
    }
    function base64Decode(str) {
        return decodeURIComponent(escape(atob(str)));
    }
    function insertSaltRandomly(text, salt) {
        let positions = [];
        let textArr = text.split('');
        for (let i = 0; i < salt.length; i++) {
            let pos = Math.floor(Math.random() * (textArr.length + 1));
            positions.push(pos);
            textArr.splice(pos, 0, salt[i]);
        }
        return {
            mixed: textArr.join(''),
            positions: positions
        };
    }
    function removeSaltByPositions(mixed, positions) {
        let arr = mixed.split('');
        // 位置需要反向排序移除，否则索引错位
        positions.sort((a, b) => b - a);
        for (let pos of positions) {
            arr.splice(pos, 1);
        }
        return arr.join('');
    }
    function encrypt() {
        const originalText = inputText.value.trim();
        const salt = saltText.value;
        if (originalText === '') {
            outputText.innerHTML = '<span class="placeholder-text">请输入要加密的内容...</span>';
            copyBtn.disabled = true;
            return;
        }
        if (!salt) {
            outputText.innerHTML = '<span class="placeholder-text">请输入盐值！</span>';
            copyBtn.disabled = true;
            return;
        }
        const { mixed, positions } = insertSaltRandomly(originalText, salt);
        const dataWithPositions = mixed + "|" + positions.join(',');
        const encryptedText = base64Encode(dataWithPositions);
        outputText.textContent = encryptedText;
        copyBtn.disabled = false;
    }
    function decrypt() {
        const encryptedText = inputText.value.trim();
        const salt = saltText.value;
        if (encryptedText === '') {
            outputText.innerHTML = '<span class="placeholder-text">请输入要解密的内容...</span>';
            copyBtn.disabled = true;
            return;
        }
        if (!salt) {
            outputText.innerHTML = '<span class="placeholder-text">请输入盐值！</span>';
            copyBtn.disabled = true;
            return;
        }
        try {
            const decoded = base64Decode(encryptedText);
            const [mixed, posStr] = decoded.split('|');
            const positions = posStr.split(',').map(p => parseInt(p, 10));
            if (positions.length !== salt.length) {
                outputText.textContent = "盐值长度不匹配，无法解密！";
                copyBtn.disabled = true;
                return;
            }
            const original = removeSaltByPositions(mixed, positions);
            outputText.textContent = original;
            copyBtn.disabled = false;
        } catch {
            outputText.innerHTML = '<span style="color:#ff6b6b">无效的Base64格式！</span>';
            copyBtn.disabled = true;
        }
    }
    function copyResult() {
        if (!outputText.textContent) return;
        navigator.clipboard.writeText(outputText.textContent).then(() => {
            notification.classList.add('show');
            setTimeout(() => notification.classList.remove('show'), 2000);
        });
    }
    function clearAll() {
        inputText.value = '';
        outputText.innerHTML = '<span class="placeholder-text">加密或解密结果将显示在这里...</span>';
        copyBtn.disabled = true;
        inputText.focus();
    }
    encryptBtn.addEventListener('click', encrypt);
    decryptBtn.addEventListener('click', decrypt);
    copyBtn.addEventListener('click', copyResult);
    clearBtn.addEventListener('click', clearAll);
});
</script>
</body>
</html>
