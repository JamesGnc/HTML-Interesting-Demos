<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地密码本管理工具</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #e0f7fa, #b2ebf2, #80deea);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            color: #333;
            padding: 30px;
            position: relative;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 150, 136, 0.2);
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #00796b;
            display: inline-block;
        }
        
        .subtitle {
            font-size: 1.1rem;
            color: #00897b;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }
        
        .search-area {
            margin-bottom: 25px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .search-container {
            flex: 1;
            position: relative;
        }
        
        .search-input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border-radius: 8px;
            border: 1px solid rgba(0, 150, 136, 0.3);
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #00897b;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #00796b;
            box-shadow: 0 0 0 3px rgba(0, 121, 107, 0.2);
        }
        
        .btn {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: #00796b;
            color: white;
        }
        
        .btn-primary:hover {
            background: #00695c;
        }
        
        .btn-secondary {
            background: rgba(0, 150, 136, 0.1);
            color: #00796b;
            border: 1px solid rgba(0, 150, 136, 0.3);
        }
        
        .btn-secondary:hover {
            background: rgba(0, 150, 136, 0.2);
        }
        
        .btn-danger {
            background: rgba(229, 57, 53, 0.1);
            color: #e53935;
            border: 1px solid rgba(229, 57, 53, 0.3);
        }
        
        .btn-danger:hover {
            background: rgba(229, 57, 53, 0.2);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        
        .password-list {
            margin: 25px 0;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(0, 150, 136, 0.2);
            max-height: 500px;
            overflow-y: auto;
        }
        
        .password-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(0, 150, 136, 0.1);
            transition: all 0.3s ease;
            position: relative;
        }
        
        .password-item:last-child {
            border-bottom: none;
        }
        
        .password-item:hover {
            background: rgba(0, 150, 136, 0.05);
        }
        
        .password-info {
            flex: 1;
        }
        
        .password-name {
            font-weight: 600;
            color: #00796b;
            margin-bottom: 5px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .password-details {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            color: #555;
            font-size: 0.95rem;
        }
        
        .password-detail {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .password-actions {
            display: flex;
            gap: 10px;
        }
        
        .password-history {
            font-size: 0.8rem;
            color: #888;
            margin-top: 5px;
            display: flex;
            gap: 10px;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }
        
        .modal.active {
            opacity: 1;
            pointer-events: all;
        }
        
        .modal-content {
            background: white;
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transform: translateY(-20px);
            transition: all 0.3s ease;
        }
        
        .modal.active .modal-content {
            transform: translateY(0);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 150, 136, 0.2);
        }
        
        .modal-title {
            font-size: 1.5rem;
            color: #00796b;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #555;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #00796b;
        }
        
        .required::after {
            content: " *";
            color: #e53935;
        }
        
        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(0, 150, 136, 0.3);
            border-radius: 8px;
            font-size: 1rem;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #00796b;
            box-shadow: 0 0 0 3px rgba(0, 121, 107, 0.2);
        }
        
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #777;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: #00796b;
            color: white;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
            transform: translateX(200%);
            transition: transform 0.4s ease;
            z-index: 1000;
        }
        
        .notification.show {
            transform: translateX(0);
        }
        
        .password-visibility {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #00796b;
            cursor: pointer;
        }
        
        .password-field {
            position: relative;
        }
        
        .watermark {
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 0.8rem;
            color: rgba(0, 121, 107, 0.5);
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .password-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .password-actions {
                align-self: flex-end;
                width: 100%;
                justify-content: flex-end;
            }
            
            .password-actions .btn {
                padding: 8px 12px;
                font-size: 0.9rem;
            }
            
            .search-area {
                flex-direction: column;
            }
            
            .search-container, .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-key"></i> 本地密码本</h1>
            <p class="subtitle">管理您的密码，所有数据将保存在本地的passwords.txt文件中</p>
        </header>
        
        <div class="search-area">
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="搜索密码条目...">
            </div>
            <button id="addPasswordBtn" class="btn btn-primary">
                <i class="fas fa-plus"></i> 添加密码
            </button>
        </div>
        
        <div id="passwordList" class="password-list">
            <div class="empty-state">
                <i class="fas fa-key" style="font-size: 3rem; color: #b2dfdb; margin-bottom: 15px;"></i>
                <h3>暂无密码条目</h3>
                <p>点击"添加密码"按钮开始记录您的密码</p>
            </div>
        </div>
        
        <div class="watermark">密码本 v1.1</div>
    </div>
    
    <!-- 添加/编辑密码的模态框 -->
    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">添加新密码</h2>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <form id="passwordForm">
                <input type="hidden" id="passwordId">
                <div class="form-group">
                    <label for="passwordName" class="form-label required">名称</label>
                    <input type="text" id="passwordName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="passwordUsername" class="form-label">用户名/邮箱</label>
                    <input type="text" id="passwordUsername" class="form-control" placeholder="(可选)">
                </div>
                <div class="form-group">
                    <label for="passwordValue" class="form-label required">密码</label>
                    <div class="password-field">
                        <input type="password" id="passwordValue" class="form-control" required>
                        <button type="button" class="password-visibility" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="passwordUrl" class="form-label">网址</label>
                    <input type="url" id="passwordUrl" class="form-control" placeholder="(可选)">
                </div>
                <div class="form-group">
                    <label for="passwordNotes" class="form-label">备注</label>
                    <textarea id="passwordNotes" class="form-control" rows="3" placeholder="(可选)"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
    
    <div id="notification" class="notification">
        操作成功！
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('searchInput');
            const addPasswordBtn = document.getElementById('addPasswordBtn');
            const passwordList = document.getElementById('passwordList');
            const passwordModal = document.getElementById('passwordModal');
            const modalTitle = document.getElementById('modalTitle');
            const closeModalBtn = document.getElementById('closeModalBtn');
            const passwordForm = document.getElementById('passwordForm');
            const passwordId = document.getElementById('passwordId');
            const passwordName = document.getElementById('passwordName');
            const passwordUsername = document.getElementById('passwordUsername');
            const passwordValue = document.getElementById('passwordValue');
            const passwordUrl = document.getElementById('passwordUrl');
            const passwordNotes = document.getElementById('passwordNotes');
            const cancelBtn = document.getElementById('cancelBtn');
            const notification = document.getElementById('notification');
            const togglePassword = document.getElementById('togglePassword');
            
            let passwords = [];
            let editingId = null;
            
            // 加载密码数据
            function loadPasswords() {
                try {
                    // 尝试从本地存储读取数据
                    const data = localStorage.getItem('passwords');
                    if (data) {
                        passwords = JSON.parse(data);
                        renderPasswordList(passwords);
                    } else {
                        // 如果没有数据，显示空状态
                        renderPasswordList([]);
                    }
                } catch (e) {
                    console.error('加载密码失败:', e);
                    passwords = [];
                    renderPasswordList(passwords);
                }
            }
            
            // 保存密码数据
            function savePasswords() {
                try {
                    localStorage.setItem('passwords', JSON.stringify(passwords));
                    return true;
                } catch (e) {
                    console.error('保存密码失败:', e);
                    return false;
                }
            }
            
            // 渲染密码列表
            function renderPasswordList(passwordsToRender) {
                if (passwordsToRender.length === 0) {
                    passwordList.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-key" style="font-size: 3rem; color: #b2dfdb; margin-bottom: 15px;"></i>
                            <h3>暂无密码条目</h3>
                            <p>点击"添加密码"按钮开始记录您的密码</p>
                        </div>
                    `;
                    return;
                }
                
                passwordList.innerHTML = '';
                
                passwordsToRender.forEach(password => {
                    const passwordItem = document.createElement('div');
                    passwordItem.className = 'password-item';
                    passwordItem.dataset.id = password.id;
                    
                    // 格式化创建/更新时间
                    const createdDate = new Date(password.createdAt);
                    const updatedDate = new Date(password.updatedAt);
                    
                    passwordItem.innerHTML = `
                        <div class="password-info">
                            <div class="password-name">
                                <i class="fas fa-lock"></i> ${password.name}
                            </div>
                            <div class="password-details">
                                ${password.username ? `<div class="password-detail"><i class="fas fa-user"></i> ${password.username}</div>` : ''}
                                ${password.url ? `<div class="password-detail"><i class="fas fa-link"></i> <a href="${password.url}" target="_blank">${password.url}</a></div>` : ''}
                                ${password.notes ? `<div class="password-detail"><i class="fas fa-sticky-note"></i> ${password.notes}</div>` : ''}
                            </div>
                            <div class="password-history">
                                <div><i class="fas fa-calendar-plus"></i> ${createdDate.toLocaleDateString()}</div>
                                <div><i class="fas fa-sync-alt"></i> ${updatedDate.toLocaleDateString()}</div>
                            </div>
                        </div>
                        <div class="password-actions">
                            <button class="btn btn-secondary edit-btn" data-id="${password.id}">
                                <i class="fas fa-edit"></i> 编辑
                            </button>
                            <button class="btn btn-danger delete-btn" data-id="${password.id}">
                                <i class="fas fa-trash"></i> 删除
                            </button>
                        </div>
                    `;
                    
                    passwordList.appendChild(passwordItem);
                });
                
                // 添加事件监听
                document.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => editPassword(e.currentTarget.dataset.id));
                });
                
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => deletePassword(e.currentTarget.dataset.id));
                });
            }
            
            // 显示通知
            function showNotification(message) {
                notification.textContent = message;
                notification.classList.add('show');
                setTimeout(() => {
                    notification.classList.remove('show');
                }, 2000);
            }
            
            // 打开模态框
            function openModal(title, password = null) {
                modalTitle.textContent = title;
                
                if (password) {
                    passwordId.value = password.id;
                    passwordName.value = password.name;
                    passwordUsername.value = password.username || '';
                    passwordValue.value = password.value;
                    passwordUrl.value = password.url || '';
                    passwordNotes.value = password.notes || '';
                    editingId = password.id;
                } else {
                    passwordForm.reset();
                    editingId = null;
                }
                
                passwordModal.classList.add('active');
                passwordName.focus();
            }
            
            // 关闭模态框
            function closeModal() {
                passwordModal.classList.remove('active');
            }
            
            // 添加新密码
            function addPassword() {
                openModal('添加新密码');
            }
            
            // 编辑密码
            function editPassword(id) {
                const password = passwords.find(p => p.id === id);
                if (password) {
                    openModal('编辑密码', password);
                }
            }
            
            // 删除密码
            function deletePassword(id) {
                if (confirm('确定要删除这个密码条目吗？此操作不可恢复。')) {
                    passwords = passwords.filter(p => p.id !== id);
                    if (savePasswords()) {
                        renderPasswordList(passwords);
                        showNotification('密码已删除');
                    } else {
                        showNotification('删除失败，请重试');
                    }
                }
            }
            
            // 保存密码
            function savePassword(e) {
                e.preventDefault();
                
                // 验证必填字段
                if (!passwordName.value.trim()) {
                    showNotification('名称不能为空');
                    passwordName.focus();
                    return;
                }
                
                if (!passwordValue.value.trim()) {
                    showNotification('密码不能为空');
                    passwordValue.focus();
                    return;
                }
                
                const passwordData = {
                    id: editingId || Date.now().toString(),
                    name: passwordName.value,
                    username: passwordUsername.value,
                    value: passwordValue.value,
                    url: passwordUrl.value,
                    notes: passwordNotes.value,
                    createdAt: editingId ? passwords.find(p => p.id === editingId).createdAt : new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };
                
                if (editingId) {
                    // 更新现有密码
                    passwords = passwords.map(p => p.id === editingId ? passwordData : p);
                    showNotification('密码已更新');
                } else {
                    // 添加新密码
                    passwords = [passwordData, ...passwords];
                    showNotification('密码已添加');
                }
                
                if (savePasswords()) {
                    renderPasswordList(passwords);
                    closeModal();
                } else {
                    showNotification('保存失败，请重试');
                }
            }
            
            // 搜索密码
            function searchPasswords() {
                const searchTerm = searchInput.value.toLowerCase();
                if (!searchTerm) {
                    renderPasswordList(passwords);
                    return;
                }
                
                const filteredPasswords = passwords.filter(password => 
                    password.name.toLowerCase().includes(searchTerm) ||
                    (password.username && password.username.toLowerCase().includes(searchTerm)) ||
                    (password.url && password.url.toLowerCase().includes(searchTerm)) ||
                    (password.notes && password.notes.toLowerCase().includes(searchTerm))
                );
                
                renderPasswordList(filteredPasswords);
            }
            
            // 切换密码可见性
            function togglePasswordVisibility() {
                const type = passwordValue.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordValue.setAttribute('type', type);
                togglePassword.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
            }
            
            // 事件监听
            addPasswordBtn.addEventListener('click', addPassword);
            closeModalBtn.addEventListener('click', closeModal);
            cancelBtn.addEventListener('click', closeModal);
            passwordForm.addEventListener('submit', savePassword);
            searchInput.addEventListener('input', searchPasswords);
            togglePassword.addEventListener('click', togglePasswordVisibility);
            
            // 初次加载
            loadPasswords();
        });
    </script>
</body>
</html>
